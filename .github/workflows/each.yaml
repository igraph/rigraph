# Helper workflow to trigger rcc for each commit on a branch
# Triggers rcc for commits after the first commit in the first-parent history
#   that already has an rcc build status.
#   The user can always rebase and force-push to move commits past the boundary and
#   re-trigger builds for specific commits.

on:
  push:
    branches:
      - each-*
      - '*-dev'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        description: "Branch ref to trigger rcc for (e.g. refs/heads/main-dev)"
        required: true
        type: string

name: each-rcc

jobs:
  each-rcc:
    if: github.repository == 'krlmlr/rigraph'
    runs-on: ubuntu-24.04
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
      versions-matrix: ${{ steps.versions-matrix.outputs.matrix }}
      dep-suggests-matrix: ${{ steps.dep-suggests-matrix.outputs.matrix }}

    name: "Trigger rcc workflow for each commit"

    permissions:
      contents: read
      statuses: read
      actions: write

    # Begin custom: services
    # End custom: services

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Enumerate commits and trigger rcc workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/each-rcc.sh
        shell: bash

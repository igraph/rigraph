# Verifies that the generated argument-migration helpers in R/handle-args-*.R
# are in sync with the registry in tools/migrations.R. If someone edits a
# generated file by hand, or changes the registry without regenerating, this
# fails. Regenerate locally with: Rscript tools/generate-migrations.R
#
# See tools/README.md ("Argument-migration helpers") for the design.
name: check-migrations

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          # The generator is base-R only; no package dependencies are needed.
          use-public-rspm: true

      - name: Regenerate migration helpers
        run: Rscript tools/generate-migrations.R

      - name: Fail if generated files drift from the registry
        run: |
          if ! git diff --exit-code -- 'R/handle-args-*.R'; then
            echo "::error::R/handle-args-*.R is out of sync with tools/migrations.R."
            echo "Run 'Rscript tools/generate-migrations.R' and commit the result."
            exit 1
          fi
        shell: bash
